<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Padrinhos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Cadastro de Padrinhos</h1>

    <form id="form">
      <label for="nome">Qual seu nome?</label>
      <input type="text" id="nome" placeholder="Seu nome" required>

      <label for="matricula">Qual a sua matrícula?</label>
      <input type="text" id="matricula" placeholder="Sua matrícula" required>

      <label for="telefone">Qual seu telefone?</label>
      <input type="text" id="telefone" placeholder="(99) 99999-9999" required>

      <label for="fotoPerfil">Foto de perfil:</label>
      <input type="file" id="fotoPerfil" accept="image/*" required>

      <label for="fotosItens">Quais objetos seus te definem (mín. 1, máx. 2)?</label>
      <input type="file" id="fotosItens" accept="image/*" multiple required>

      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
