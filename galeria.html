<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apadrinator3000 - Galeria</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="./images/favi.png" type="image/png">
</head>
<body>
  <div class="container">

    <h1>Escolha até 3 itens</h1>

    <div id="items-container" class="grid-view"></div>

    <button id="gerar-resultado" type="button">Gerar Resultado</button>
  </div>

  <div id="confirm-popup" class="popup">
    <div class="popup-content">
      <h3>Confirmar seleção?</h3>
      <p>Veja abaixo os itens escolhidos:</p>
      <div id="thumbs"></div>
      <div class="popup-buttons">
        <button type="button" onclick="confirmarSelecao()">Confirmar</button>
        <button type="button" onclick="fecharConfirmacao()">Voltar</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
